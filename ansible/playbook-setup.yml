---
# ============================================================
# Playbook 1: Server Setup
# Purpose: Install Docker, Docker Compose, and dependencies
#           on a fresh Ubuntu server
# Usage: ansible-playbook -i inventory.ini playbook-setup.yml
# ============================================================

- name: Setup Server for Meal Recipe Platform
  hosts: webservers
  become: yes
  vars:
    app_user: ubuntu
    app_dir: /opt/meal-recipe-platform

  tasks:

    - name: Update apt package cache
      apt:
        update_cache: yes
        cache_valid_time: 3600

    - name: Install required system packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - gnupg
          - lsb-release
          - git
          - ufw
          - python3
          - python3-pip
        state: present

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_lsb.codename }} stable"
        state: present

    - name: Install Docker CE
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present
        update_cache: yes

    - name: Install Docker Compose
      apt:
        name: docker-compose
        state: present

    - name: Start and enable Docker service
      systemd:
        name: docker
        state: started
        enabled: yes

    - name: Add user to docker group
      user:
        name: "{{ app_user }}"
        groups: docker
        append: yes

    - name: Create application directory
      file:
        path: "{{ app_dir }}"
        state: directory
        owner: "{{ app_user }}"
        mode: '0755'

    - name: Configure UFW firewall - allow SSH
      ufw:
        rule: allow
        port: '22'
        proto: tcp

    - name: Configure UFW firewall - allow HTTP
      ufw:
        rule: allow
        port: '80'
        proto: tcp

    - name: Configure UFW firewall - allow HTTPS
      ufw:
        rule: allow
        port: '443'
        proto: tcp

    - name: Configure UFW firewall - allow backend port
      ufw:
        rule: allow
        port: '5000'
        proto: tcp

    - name: Enable UFW firewall
      ufw:
        state: enabled

    - name: Verify Docker installation
      command: docker --version
      register: docker_version

    - name: Print Docker version
      debug:
        msg: "Docker installed: {{ docker_version.stdout }}"

    - name: Verify Docker Compose installation
      command: docker-compose --version
      register: compose_version

    - name: Print Docker Compose version
      debug:
        msg: "Docker Compose installed: {{ compose_version.stdout }}"
