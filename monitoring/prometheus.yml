global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Monitor Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Monitor the Flask backend
  - job_name: 'meal_platform_backend'
    static_configs:
      - targets: ['backend:5000']
    metrics_path: '/metrics'

  # Monitor the host machine (node exporter)
  - job_name: 'node_exporter'
    static_configs:
      - targets: ['node_exporter:9100']
