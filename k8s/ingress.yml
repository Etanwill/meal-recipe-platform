---
# ============================================================
# Ingress - Routes external traffic to services
# ============================================================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: meal-platform-ingress
  namespace: meal-platform
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
spec:
  rules:
    - host: meal-platform.local
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-service
                port:
                  number: 5000
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-service
                port:
                  number: 80
